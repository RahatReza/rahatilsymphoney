<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAHATIL | TIDAL CONVERGENCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;400&display=swap');

        /* PILLAR 4: DOM/CANVAS SPLIT - CSS handles passive touch blocking natively */
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            cursor: none;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            z-index: 1;
            filter: contrast(1.05);
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        /* IMMERSION GATEWAY (DESKTOP ONLY) */
        #intro-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            transition: opacity 1.5s ease, backdrop-filter 1.5s ease;
            cursor: pointer;
        }

        .intro-visual {
            width: 80px;
            height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            position: relative;
            animation: visual-pulse 2s ease-in-out infinite;
            margin-bottom: 40px;
        }

        .intro-visual::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: sound-wave 1.5s ease-out infinite;
        }

        .intro-visual::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: sound-wave-outer 1.5s ease-out infinite;
            animation-delay: 0.3s;
        }

        @keyframes visual-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); }
        }

        @keyframes sound-wave {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        @keyframes sound-wave-outer {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        .intro-text {
            color: #fff;
            font-size: 0.7rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            animation: pulse-breath 2.5s infinite alternate ease-in-out;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            margin-bottom: 15px;
        }

        .intro-hint {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.55rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: hint-fade 3s ease-in-out infinite;
        }

        @keyframes pulse-breath {
            0% { opacity: 0.3; letter-spacing: 15px; }
            100% { opacity: 1; letter-spacing: 20px; }
        }

        @keyframes hint-fade {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* STANDARD UI */
        #ui-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            transition: opacity 1.2s ease;
        }

        .brand-text { text-align: center; }

        h1 {
            font-weight: 100;
            letter-spacing: 35px;
            color: #fff;
            margin: 0;
            font-size: 3.2rem;
            text-transform: uppercase;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.35), 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn-init {
            margin-top: 80px;
            pointer-events: auto;
            cursor: pointer;
            color: #fff;
            font-size: 0.7rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            opacity: 0.5;
            transition: 0.4s;
            position: relative;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
        }

        .btn-init::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 25%;
            width: 50%;
            height: 1px;
            background: #fff;
            opacity: 0.2;
            transition: 0.4s;
        }

        .btn-init:hover { opacity: 1; letter-spacing: 20px; }
        .btn-init:hover::after { width: 100%; left: 0; opacity: 1; }

        #cinematic-layer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.6s ease;
            width: 100%;
        }

        .cine-title {
            font-weight: 100;
            font-size: 2.2rem;
            color: #fff;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 0 4px 25px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-align: center;
        }

        .cine-sub {
            font-size: 0.65rem;
            color: #ddd;
            letter-spacing: 12px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s ease;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        #cinematic-layer.active { opacity: 1; }
        #cinematic-layer.active .cine-title { opacity: 1; transform: translateY(0); letter-spacing: 28px; transition-delay: 0.1s; }
        #cinematic-layer.active .cine-sub:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.4s; }
        #cinematic-layer.active .cine-sub:nth-child(3) { opacity: 1; transform: translateY(0); color: #fff; transition-delay: 0.8s; }

        #cursor {
            position: fixed; pointer-events: none; z-index: 9999; width: 22px; height: 22px;
            border: 1.5px solid #fff; border-radius: 50%; transform: translate(-50%, -50%);
            mix-blend-mode: difference; transition: transform 0.2s ease;
        }

        /* ENGINEERING OVERRIDE PANEL UI */
        .overlay-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9000; display: none; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); pointer-events: auto;
        }

        #auth-input {
            background: transparent; border: none; border-bottom: 1px solid #fff; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 1.2rem; text-align: center; outline: none;
            letter-spacing: 5px; padding: 10px; width: 300px; text-transform: uppercase;
        }

        #auth-input::placeholder { color: rgba(255, 255, 255, 0.3); }

        .panel-box {
            background: rgba(10, 10, 15, 0.8); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; padding: 30px; width: 400px; max-width: 90%; max-height: 85vh;
            overflow-y: auto; color: #fff; font-family: 'Inter', sans-serif;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8); display: flex; flex-direction: column;
            gap: 15px; box-sizing: border-box;
        }

        .panel-box::-webkit-scrollbar { width: 6px; }
        .panel-box::-webkit-scrollbar-track { background: transparent; }
        .panel-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        .panel-box::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .panel-box h3 {
            margin: 0 0 5px 0; font-weight: 100; letter-spacing: 8px; text-transform: uppercase;
            font-size: 1.2rem; text-align: center; color: #aaa;
        }

        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        .slider-group label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #888; display: flex; justify-content: space-between; }
        .slider-group span { color: #fff; }

        input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #fff; cursor: pointer; margin-top: -7px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; cursor: pointer; background: rgba(255, 255, 255, 0.2); border-radius: 1px; }

        .panel-buttons { display: flex; gap: 10px; margin-top: 15px; }

        .btn-panel {
            flex: 1; padding: 12px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; font-family: 'Inter';
            font-size: 0.65rem; transition: 0.3s;
        }
        .btn-panel:hover { background: rgba(255, 255, 255, 0.2); }

        .btn-reset { color: #ffa0a0; border-color: rgba(255, 100, 100, 0.3); }
        .btn-reset:hover { background: rgba(255, 100, 100, 0.15); border-color: rgba(255, 100, 100, 0.6); }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; letter-spacing: 18px; margin-left: 18px; }
            .btn-init { font-size: 0.6rem; letter-spacing: 10px; margin-top: 50px; }
            .btn-init:hover { letter-spacing: 12px; }
            .cine-title { font-size: 1.5rem; letter-spacing: 8px; }
            .cine-sub { font-size: 0.5rem; letter-spacing: 6px; }
            #cinematic-layer.active .cine-title { letter-spacing: 15px; }
            .panel-box { padding: 20px; gap: 12px; }
            .panel-box h3 { font-size: 1rem; letter-spacing: 5px; }
        }
    </style>
</head>

<body>
    <div id="cursor"></div>
    <canvas id="v"></canvas>

    <div id="intro-layer" onclick="window.enterExperience()">
        <div class="intro-visual"></div>
        <div class="intro-text">Click to Begin</div>
        <div class="intro-hint">Enable Audio Experience</div>
    </div>

    <div id="ui-layer">
        <div class="brand-text">
            <h1 id="ui-mainTitle">RAHATIL</h1>
            <div class="btn-init" id="ui-btnText" onclick="engage()">Initialize</div>
        </div>
    </div>

    <div id="cinematic-layer">
        <div class="cine-title" id="ui-cineTitle">Welcome, Rahatil</div>
        <div class="cine-sub" id="ui-cineSub1">Calibrating Tidal Engine...</div>
        <div class="cine-sub" id="ui-cineSub2">Redirecting to Terminal</div>
    </div>

    <div id="auth-modal" class="overlay-layer">
        <input type="password" id="auth-input" placeholder="OVERRIDE CODE" autocomplete="off" />
    </div>

    <div id="custom-panel" class="overlay-layer">
        <div class="panel-box">
            <h3>Engine Override</h3>
            <div class="slider-group">
                <label>Wave Energy <span id="val-energy">2.2</span></label>
                <input type="range" id="inp-energy" min="0" max="10" step="0.1" value="2.2">
            </div>
            <div class="slider-group">
                <label>Wave Height <span id="val-height">0.05</span></label>
                <input type="range" id="inp-height" min="0" max="0.5" step="0.01" value="0.05">
            </div>
            <div class="slider-group">
                <label>Star Density (Lower = More) <span id="val-stars">600</span></label>
                <input type="range" id="inp-stars" min="100" max="1500" step="10" value="600">
            </div>
            <div class="slider-group">
                <label>Water Red <span id="val-r">0.01</span></label>
                <input type="range" id="inp-r" min="0" max="1" step="0.01" value="0.01">
            </div>
            <div class="slider-group">
                <label>Water Green <span id="val-g">0.04</span></label>
                <input type="range" id="inp-g" min="0" max="1" step="0.01" value="0.04">
            </div>
            <div class="slider-group">
                <label>Water Blue <span id="val-b">0.08</span></label>
                <input type="range" id="inp-b" min="0" max="1" step="0.01" value="0.08">
            </div>

            <div class="panel-buttons">
                <button class="btn-panel btn-reset" onclick="resetAdminPanel()">Reset</button>
                <button class="btn-panel" onclick="closeAdminPanel()">Sync & Close</button>
            </div>
        </div>
    </div>

    <!-- GPU SHADER CORE (PILLAR 1, 2, 3: PERCEPTUAL CULLING & FAKE MATH) -->
    <script id="fs" type="x-shader/x-fragment">#version 300 es
#ifdef GL_FRAGMENT_PRECISION_HIGH
precision highp float;
#else
precision mediump float;
#endif

out vec4 fragColor;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;
uniform float u_warp;
uniform float u_waveTime;

uniform vec3 u_waterColor;
uniform float u_waveEnergy;
uniform float u_waveHeight;
uniform float u_starDensity;
uniform float u_quality; 

#define PI 3.14159265359

// Fast Hash
float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
float noise(vec2 p) {
    vec2 i = floor(p); vec2 f = fract(p);
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), u.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
}

// PILLAR 2: PERCEPTUAL MATH - Removed pow() entirely. Using raw multiplication.
float GetWaterHeight(vec3 p, bool micro) {
    float t = u_waveTime;
    float h = 0.0;
    vec2 uv = p.xz * 0.75;
    
    vec2 d1 = normalize(vec2(1.0, 1.2));
    float w1 = sin(dot(uv, d1) * 1.5 + t * 0.8) * 0.5 + 0.5;
    h += u_waveHeight * 1.5 * (w1 * w1); 
    
    vec2 d2 = normalize(vec2(-1.0, 0.8));
    float w2 = sin(dot(uv, d2) * 2.8 - t * 1.2) * 0.5 + 0.5;
    h += (u_waveHeight * 0.8) * (w2 * w2);
    
    // PILLAR 3: ADAPTIVE DEGRADATION (Shut down waves if phone lags)
    if (u_quality > 0.4) {
        vec2 d3 = normalize(vec2(0.3, -1.5));
        float w3 = sin(dot(uv, d3) * 5.0 + t * 1.5) * 0.5 + 0.5;
        h += (u_waveHeight * 0.4) * (w3 * w3);
        
        if (u_quality > 0.7) {
            vec2 d4 = normalize(vec2(-0.7, -0.5));
            float w4 = sin(dot(uv, d4) * 3.5 + t * 0.6) * 0.5 + 0.5;
            h += (u_waveHeight * 0.25) * (w4 * w4);
        }
    }

    if(micro && u_quality > 0.8) {
        vec2 uv1 = mat2(0.8, -0.6, 0.6, 0.8) * uv * 8.0;
        h += (noise(uv1 + t) * 0.5) * (u_waveHeight * 0.18);
    }
    
    return h - (u_waveHeight * 0.5);
}

// OPTIMIZED NORMALS: Skip micro-noise when calculating offsets to prevent 3x math multiplier
vec3 GetNormal(vec3 p) {
    vec2 e = vec2(0.05, 0.0); // Wider epsilon for smoother mobile normals
    float h = GetWaterHeight(p, false);
    return normalize(vec3(
        h - GetWaterHeight(p - e.xyy, false), 
        0.04 + (u_waveHeight * 0.4), 
        h - GetWaterHeight(p - e.yxy, false)
    ));
}

float GetStars(vec3 rd, float nightFactor, bool isRef) {
    vec2 starUV = rd.xz / (abs(rd.y) + 0.001);
    float baseHash = hash(starUV);
    
    // PILLAR 2: Cheat stars using step instead of expensive pow on low end
    if (u_quality < 0.5) return step(0.995, baseHash) * nightFactor;

    float stars = pow(baseHash, isRef ? u_starDensity * 1.33 : u_starDensity);
    float starPhase = hash(starUV + vec2(45.2, 12.8)) * PI * 2.0;
    float starFreq = hash(starUV + vec2(9.3, 74.1)) * 2.5 + 0.5;
    return stars * (0.5 + 0.5 * sin(u_time * starFreq + starPhase)) * nightFactor * (1.0 - smoothstep(0.1, 0.7, u_warp));
}

float getClouds(vec3 rd, float t, bool isRef) {
    if (u_quality < 0.4) return 0.0; // Cull entirely on potato phones

    vec2 uv = rd.xz / (rd.y + 0.001) * 0.4;
    uv.x -= t * 0.05;      
    float f = noise(uv);
    
    if (u_quality > 0.6) {
        uv = mat2(1.6, 1.2, -1.2, 1.6) * uv;
        f += 0.5 * noise(uv + t * 0.03);
    }
    
    if(!isRef && u_quality > 0.9) {
        uv = mat2(1.6, 1.2, -1.2, 1.6) * uv;
        f += 0.25 * noise(uv - t * 0.02);
    }
    
    return smoothstep(0.9, 1.7, f) * smoothstep(0.0, 0.15, rd.y);
}

vec3 getCloudColor(vec3 rd, vec3 sunDir) {
    vec3 cloudDay = vec3(0.95, 0.98, 1.0);
    vec3 cloudSunset = vec3(1.0, 0.4, 0.15);
    vec3 cloudNight = vec3(0.01, 0.015, 0.03);      
    
    float cloudDayFact = smoothstep(-0.1, 0.15, sunDir.y);
    vec3 cColor = mix(cloudNight, mix(cloudSunset, cloudDay, smoothstep(-0.05, 0.25, sunDir.y)), cloudDayFact);
    
    if (u_quality > 0.6) {
        float sDot = max(0.0, dot(rd, sunDir));
        cColor += vec3(1.0, 0.6, 0.2) * (sDot * sDot * sDot * sDot) * smoothstep(-0.1, 0.3, sunDir.y) * 0.5;
    }
    return cColor;
}

void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / u_res.y;
    float t = u_time * 0.3;
    
    float shakeIntensity = (u_warp * u_warp * u_warp) * 0.04;
    uv += vec2(sin(u_time * 150.0), cos(u_time * 130.0)) * shakeIntensity;

    float solarEase = u_warp * u_warp * (3.0 - 2.0 * u_warp);
    float currentSunY = mix(0.15 + u_mouse.y * 1.0, -1.5, solarEase);
    vec3 sunDir = normalize(vec3(u_mouse.x * 1.5, currentSunY, 1.0));
    vec3 moonDir = normalize(vec3(-u_mouse.x * 1.5, -currentSunY - 0.1, 1.0));

    vec3 ro = vec3(0, 1.5, t * (2.0 + u_warp * 35.0));
    vec3 rd = normalize(vec3(uv.x, uv.y - 0.1, 1.1 + u_warp * 0.6));  
    
    float dayFactor = smoothstep(-0.02, 0.15, sunDir.y);
    float nightFactor = 1.0 - dayFactor;
    float trueNight = smoothstep(-0.02, -0.15, sunDir.y);
    
    vec3 zenith = mix(vec3(0.0, 0.0005, 0.002), vec3(0.05, 0.15, 0.4), dayFactor);
    vec3 horizon = mix(vec3(0.001, 0.004, 0.012), mix(vec3(1.0, 0.35, 0.1), vec3(0.35, 0.65, 0.85), smoothstep(0.0, 0.4, sunDir.y)), dayFactor);
    horizon += vec3(1.0, 0.4, 0.1) * (smoothstep(-0.15, 0.1, sunDir.y) * smoothstep(0.4, -0.05, sunDir.y)) * max(0.0, dot(rd, sunDir));
    
    vec3 col = mix(horizon, zenith, smoothstep(-0.2, 0.6, rd.y));
    float sunMask = smoothstep(-0.05, 0.02, sunDir.y);
    float moonMask = smoothstep(-0.05, 0.02, moonDir.y);

    // PILLAR 1: RUTHLESS CULLING (Sky Context)
    if (rd.y >= 0.0) {
        if(nightFactor > 0.01) {
            if (u_quality > 0.5) col += vec3(0.08, 0.03, 0.12) * (noise(rd.xz / (rd.y + 0.001) * 2.0 + t) * noise(rd.xz / (rd.y + 0.001) * 4.0 - t)) * nightFactor * smoothstep(0.0, 0.3, rd.y) * 0.6 * (1.0 - smoothstep(0.2, 0.8, u_warp));
            col += GetStars(rd, nightFactor, false) * smoothstep(-0.1, 0.2, rd.y);
        }

        float cloudAlpha = getClouds(rd, u_time, false);
        if(cloudAlpha > 0.0) col = mix(col, mix(vec3(0.01, 0.015, 0.03), mix(vec3(1.0, 0.4, 0.15), vec3(0.95, 0.98, 1.0), smoothstep(-0.05, 0.25, sunDir.y)), smoothstep(-0.1, 0.15, sunDir.y)), cloudAlpha * 0.65);

        float sunDot = max(0.0, dot(rd, sunDir));
        float sunAltD = max(0.0, sunDir.y);
        vec3 coreColor = mix(vec3(1.0, 0.7, 0.4), vec3(1.0, 0.98, 0.95), smoothstep(0.0, 0.3, sunAltD));
        vec3 glowColor = mix(vec3(1.0, 0.25, 0.05), vec3(1.0, 0.8, 0.5), smoothstep(0.0, 0.4, sunAltD));
        vec3 cinematicSun = coreColor * (smoothstep(0.9985, 0.9998, sunDot) * 2.5);
        if (u_quality > 0.4) cinematicSun += glowColor * (pow(sunDot, 180.0) * 1.5);            
        col += cinematicSun * sunMask;
        
        float moonDot = max(0.0, dot(rd, moonDir));
        vec3 moonRight = normalize(cross(vec3(0.0, 1.0, 0.0), moonDir));
        vec3 moonUp = cross(moonDir, moonRight);
        vec2 moonUV = vec2(dot(rd, moonRight), dot(rd, moonUp)) * 45.0;
        
        float craters = 0.5;
        if (u_quality > 0.6) craters = noise(moonUV * 8.0) * 0.6 + noise(moonUV * 20.0) * 0.4;
        
        vec3 moonSurface = mix(vec3(0.5, 0.55, 0.6), vec3(1.0, 0.98, 0.95), craters);
        float moonDist = clamp((1.0 - moonDot) / (1.0 - 0.9993), 0.0, 1.0);
        
        vec3 cinematicMoon = moonSurface * sqrt(1.0 - moonDist * moonDist) * smoothstep(0.9993, 0.99945, moonDot) * 2.2; 
        if (u_quality > 0.4) cinematicMoon += vec3(0.7, 0.85, 1.0) * (pow(moonDot, 250.0) * 1.2);
        col += cinematicMoon * trueNight * moonMask;
    }

    // PILLAR 1: RUTHLESS CULLING (Water Context)
    if(rd.y < 0.02) {
        float d = -(ro.y) / min(rd.y, -0.002); 
        vec3 p = ro + rd * d;

                    _frameHealth = (30 - droppedFrames) / 30;
                    
                    // If heavily lagging, ruthless GPU Math Drop (no blurry screens)
                    if (_frameHealth < 0.85) {
                        globalQuality = Math.max(0.0, globalQuality - 0.2);
                        // Only drop Resolution IF ALL math has already been culled
                        if (globalQuality <= 0.05 && currentDPR > 1.0) {
                            currentDPR = Math.max(1.0, currentDPR - 0.25);
                            resizeCanvas();
                        }
                    } else if (_frameHealth > 0.95 && globalQuality < 1.0) {
                        if (currentDPR < baseDPR) {
                            currentDPR = Math.min(baseDPR, currentDPR + 0.25);
                            resizeCanvas();
                        } else {
                            globalQuality = Math.min(1.0, globalQuality + 0.1);
                        }
                    }
                    framesAnalyzed = 0; droppedFrames = 0;
                }
                if (_elapsed > 20) droppedFrames++; 
                framesAnalyzed++;
            }

            let timeSinceTouch = Date.now() - lastTouchTime;
            if (gyroActive) {
                if (isTouching || timeSinceTouch < 150) {
                    offsetMX = mX - targetMX; offsetMY = mY - targetMY;
                    if (isTouching) lastTouchTime = Date.now();
                } else {
                    if (timeSinceTouch > 2000) { 
                        _decay = Math.pow(0.95, _dtFactor); 
                        offsetMX *= _decay; offsetMY *= _decay; 
                    }
                    _destX = targetMX + offsetMX; _destY = targetMY + offsetMY;
                    _lerpAmt = 1.0 - Math.pow(0.93, _dtFactor); 
                    mX += (_destX - mX) * _lerpAmt; mY += (_destY - mY) * _lerpAmt;
                }
            }

            _solarEase = warp * warp * (3.0 - 2.0 * warp);
            _currentSunY = 0.15 + mY * 1.0;
            _sunY = _currentSunY * (1.0 - _solarEase) + (-1.5) * _solarEase;
            
            _dayFactor = Math.max(0.0, Math.min(1.0, (_sunY + 0.02) / 0.17));
            _nightFactor = 1.0 - _dayFactor;
            
            currentDayFactor = currentDayFactor + (_dayFactor - currentDayFactor) * 0.05;
            currentNightFactor = currentNightFactor + (_nightFactor - currentNightFactor) * 0.05;
            
            _isSunset = (_sunY > -0.1 && _sunY < 0.15) ? 1.0 : 0.0;
            _sunsetFactor = _isSunset * (1.0 - Math.abs(_sunY - 0.02) / 0.15);

            if (isW) {
                warp = Math.min(1.0, warp + (0.008 * _dtFactor));
                if (warp >= 1.0 && !redirected) { redirected = true; window.location.href = TARGET; }
            } else if (audioInit && audioCtx && audioCtx.state === 'running') {
                _waveCycle = Math.sin(waveTime * 0.3);

                if (masterPanner && masterPanner.pan) {
                    _panTarget = Math.max(-1.0, Math.min(1.0, mX * 0.8));
                    masterPanner.pan.setTargetAtTime(_panTarget, audioCtx.currentTime, 0.2);
                }

                if (waterFilter && waterSource && waterGain) {
                    _targetWaterFreq = 250 + (_waveCycle * 100) + (engineConfig.height * 600) - (mY * 150);
                    waterFilter.frequency.setTargetAtTime(Math.max(150, _targetWaterFreq), audioCtx.currentTime, 0.1);
                    _targetRate = 0.4 + (engineConfig.energy * 0.02) + (_waveCycle * 0.03);
                    waterSource.playbackRate.setTargetAtTime(Math.max(0.1, _targetRate), audioCtx.currentTime, 0.1);
                    _waterVol = 0.12 + currentDayFactor * 0.08;
                    waterGain.gain.setTargetAtTime(_waterVol, audioCtx.currentTime, 0.3);
                }
                if (windFilter && windGain) {
                    _windFreq = 600 + currentDayFactor * 600 + _sunsetFactor * 400;
                    windFilter.frequency.setTargetAtTime(_windFreq, audioCtx.currentTime, 0.3);
                    _windVol = 0.03 + currentDayFactor * 0.05 + _sunsetFactor * 0.04;
                    windGain.gain.setTargetAtTime(_windVol, audioCtx.currentTime, 0.3);
                }
                if (ambientFilter && ambientGain) {
                    _ambientFreq = 1500 + currentDayFactor * 1000 - currentNightFactor * 500;
                    ambientFilter.frequency.setTargetAtTime(_ambientFreq, audioCtx.currentTime, 0.5);
                    _ambientVol = 0.03 + currentDayFactor * 0.03 + _sunsetFactor * 0.04;
                    ambientGain.gain.setTargetAtTime(_ambientVol, audioCtx.currentTime, 0.3);
                }
                if (nightFilter && nightGain) {
                    _nightVol = currentNightFactor * 0.12;
                    nightGain.gain.setTargetAtTime(_nightVol, audioCtx.currentTime, 0.5);
                    _nightFreq = 300 + Math.abs(mY) * 150;
                    nightFilter.frequency.setTargetAtTime(_nightFreq, audioCtx.currentTime, 0.3);
                }
                if (droneGain) {
                    _droneVol = 0.02 + currentNightFactor * 0.04 + _sunsetFactor * 0.02;
                    droneGain.gain.setTargetAtTime(_droneVol, audioCtx.currentTime, 0.5);
                }
            }

            gl.useProgram(prg);
            gl.uniform2f(uLocs.res, canvas.width, canvas.height);
            gl.uniform1f(uLocs.time, now * 0.001);
            gl.uniform2f(uLocs.mouse, mX, mY);
            gl.uniform1f(uLocs.warp, warp);
            gl.uniform1f(uLocs.wTime, waveTime);
            gl.uniform3f(uLocs.wColor, engineConfig.r, engineConfig.g, engineConfig.b);
            gl.uniform1f(uLocs.wEnergy, engineConfig.energy);
            gl.uniform1f(uLocs.wHeight, engineConfig.height);
            gl.uniform1f(uLocs.sDensity, engineConfig.stars);
            gl.uniform1f(uLocs.quality, globalQuality);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 's') {
                e.preventDefault();
                const authModal = document.getElementById('auth-modal');
                const authInput = document.getElementById('auth-input');
                if (authModal && authInput) {
                    authModal.style.display = 'flex';
                    authInput.value = '';
                    authInput.focus();
                }
            }
        });

        const aInp = document.getElementById('auth-input');
        if (aInp) {
            aInp.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const val = e.target.value.trim();
                    if (val === 'abcab123') {
                        document.getElementById('auth-modal').style.display = 'none';
                        const cp = document.getElementById('custom-panel');
                        if(cp) cp.style.display = 'flex';
                        e.target.value = '';
                    } else {
                        e.target.style.color = '#ff4444';
                        setTimeout(() => e.target.style.color = '#fff', 600);
                    }
                }
            });
        }

        configKeys.forEach(k => {
            const inp = document.getElementById(`inp-${k}`);
            if (inp) {
                inp.addEventListener('input', (e) => {
                    lastTouchTime = Date.now();
                    const val = parseFloat(e.target.value);
                    const valDisplay = document.getElementById(`val-${k}`);
                    if(valDisplay) valDisplay.innerText = val.toFixed(k === 'stars' ? 0 : 2);
                    engineConfig[k] = val;
                    try { localStorage.setItem('rahatil_engine_config', JSON.stringify(engineConfig)); } catch (err) { }
                });
            }
        });

        textKeys.forEach(k => {
            const inp = document.getElementById(`inp-${k}`);
            if (inp) {
                inp.addEventListener('input', (e) => {
                    engineConfig[k] = e.target.value;
                    applyTextConfig();
                    try { localStorage.setItem('rahatil_engine_config', JSON.stringify(engineConfig)); } catch (err) { }
                });
            }
        });

        function resetAdminPanel() {
            localStorage.removeItem('rahatil_engine_config');
            engineConfig = { ...defaultConfig };
            syncUIWithConfig();
        }

        function closeAdminPanel() { 
            const cp = document.getElementById('custom-panel');
            if (cp) cp.style.display = 'none'; 
        }
        
    </script>
</body>

</html>
