<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAHATIL | TIDAL CONVERGENCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;400&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            cursor: none;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            z-index: 1;
            filter: contrast(1.05);
        }

        /* STANDARD UI */
        #ui-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .brand-text {
            text-align: center;
        }

        /* Adjusted shadow for perfect daylight readability */
        h1 {
            font-weight: 100;
            letter-spacing: 35px;
            color: #fff;
            margin: 0;
            font-size: 3.2rem;
            text-transform: uppercase;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.35), 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .btn-init {
            margin-top: 80px;
            pointer-events: auto;
            cursor: pointer;
            color: #fff;
            font-size: 0.7rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            opacity: 0.5;
            transition: 0.4s;
            position: relative;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
        }

        .btn-init::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 25%;
            width: 50%;
            height: 1px;
            background: #fff;
            opacity: 0.2;
            transition: 0.4s;
        }

        .btn-init:hover {
            opacity: 1;
            letter-spacing: 20px;
        }

        .btn-init:hover::after {
            width: 100%;
            left: 0;
            opacity: 1;
        }

        #cinematic-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.6s ease;
            width: 100%;
        }

        .cine-title {
            font-weight: 100;
            font-size: 2.2rem;
            color: #fff;
            letter-spacing: 15px;
            text-transform: uppercase;
            text-shadow: 0 4px 25px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-align: center;
        }

        .cine-sub {
            font-size: 0.65rem;
            color: #ddd;
            letter-spacing: 12px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s ease;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        #cinematic-layer.active {
            opacity: 1;
        }

        #cinematic-layer.active .cine-title {
            opacity: 1;
            transform: translateY(0);
            letter-spacing: 28px;
            transition-delay: 0.1s;
        }

        #cinematic-layer.active .cine-sub:nth-child(2) {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.4s;
        }

        #cinematic-layer.active .cine-sub:nth-child(3) {
            opacity: 1;
            transform: translateY(0);
            color: #fff;
            transition-delay: 0.8s;
        }

        #cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 22px;
            height: 22px;
            border: 1.5px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: transform 0.2s ease;
        }

        /* ENGINEERING OVERRIDE PANEL UI */
        .overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9000;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            pointer-events: auto;
        }

        #auth-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #fff;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            letter-spacing: 5px;
            padding: 10px;
            width: 300px;
            text-transform: uppercase;
        }

        #auth-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .panel-box {
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 30px;
            width: 400px;
            max-width: 90%;
            color: #fff;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        .panel-box h3 {
            margin: 0 0 10px 0;
            font-weight: 100;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 1.2rem;
            text-align: center;
            color: #aaa;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-group label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
            display: flex;
            justify-content: space-between;
        }

        .slider-group span {
            color: #fff;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            margin-top: -7px;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
        }

        .panel-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-panel {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: 'Inter';
            font-size: 0.65rem;
            transition: 0.3s;
        }

        .btn-panel:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-reset {
            color: #ffa0a0;
            border-color: rgba(255, 100, 100, 0.3);
        }

        .btn-reset:hover {
            background: rgba(255, 100, 100, 0.15);
            border-color: rgba(255, 100, 100, 0.6);
        }

        /* MOBILE RESPONSIVE SCALING */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
                letter-spacing: 18px;
                margin-left: 18px;
            }

            .btn-init {
                font-size: 0.6rem;
                letter-spacing: 10px;
                margin-top: 50px;
            }

            .btn-init:hover {
                letter-spacing: 12px;
            }

            .cine-title {
                font-size: 1.5rem;
                letter-spacing: 8px;
            }

            .cine-sub {
                font-size: 0.5rem;
                letter-spacing: 6px;
            }

            #cinematic-layer.active .cine-title {
                letter-spacing: 15px;
            }

            .panel-box {
                padding: 20px;
                gap: 12px;
            }

            .panel-box h3 {
                font-size: 1rem;
                letter-spacing: 5px;
            }
        }
    </style>
</head>

<body>
    <div id="cursor"></div>
    <canvas id="v"></canvas>

    <div id="ui-layer">
        <div class="brand-text">
            <h1>RAHATIL</h1>
            <div class="btn-init" onclick="engage()">Initialize</div>
        </div>
    </div>

    <div id="cinematic-layer">
        <div class="cine-title">Welcome, Rahatil</div>
        <div class="cine-sub">Calibrating Tidal Engine...</div>
        <div class="cine-sub">Redirecting to Terminal</div>
    </div>

    <!-- ADMIN AUTHORIZATION MODAL -->
    <div id="auth-modal" class="overlay-layer">
        <input type="password" id="auth-input" placeholder="OVERRIDE CODE" autocomplete="off" />
    </div>

    <!-- ENGINEERING PANEL -->
    <div id="custom-panel" class="overlay-layer">
        <div class="panel-box">
            <h3>Engine Override</h3>

            <div class="slider-group">
                <label>Wave Energy <span id="val-energy">2.2</span></label>
                <input type="range" id="inp-energy" min="0" max="10" step="0.1" value="2.2">
            </div>
            <div class="slider-group">
                <label>Wave Height <span id="val-height">0.05</span></label>
                <input type="range" id="inp-height" min="0" max="0.2" step="0.01" value="0.05">
            </div>
            <div class="slider-group">
                <label>Star Density (Lower = More) <span id="val-stars">600</span></label>
                <input type="range" id="inp-stars" min="100" max="1500" step="10" value="600">
            </div>
            <div class="slider-group">
                <label>Water Red <span id="val-r">0.01</span></label>
                <input type="range" id="inp-r" min="0" max="1" step="0.01" value="0.01">
            </div>
            <div class="slider-group">
                <label>Water Green <span id="val-g">0.04</span></label>
                <input type="range" id="inp-g" min="0" max="1" step="0.01" value="0.04">
            </div>
            <div class="slider-group">
                <label>Water Blue <span id="val-b">0.08</span></label>
                <input type="range" id="inp-b" min="0" max="1" step="0.01" value="0.08">
            </div>

            <div class="panel-buttons">
                <button class="btn-panel btn-reset" onclick="resetAdminPanel()">Reset Default</button>
                <button class="btn-panel" onclick="closeAdminPanel()">Sync & Close</button>
            </div>
        </div>
    </div>

    <script id="fs" type="x-shader/x-fragment">#version 300 es

// SAFARI PRECISION HANDLING
#ifdef GL_FRAGMENT_PRECISION_HIGH
precision highp float;
#else
precision mediump float;
#endif

out vec4 fragColor;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;
uniform float u_warp; 

// NEW MOBILE/TOUCH UNIFORMS
uniform float u_isMobile;
uniform float u_touching;

// CUSTOMIZATION UNIFORMS
uniform vec3 u_waterColor;
uniform float u_waveEnergy;
uniform float u_waveHeight;
uniform float u_starDensity;

#define PI 3.14159265359

float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
float noise(vec2 p) {
    vec2 i = floor(p); vec2 f = fract(p);
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(hash(i), hash(i+vec2(1,0)), u.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
}

// MULTI-OCTAVE GERSTNER WAVE FORMULA
float GetWaterHeight(vec3 p, bool micro) {
    float t = u_time * u_waveEnergy; 
    float h = 0.0;
    vec2 uv = p.xz;
    
    vec2 d1 = normalize(vec2(1.0, 1.2));
    h += u_waveHeight * (sin(dot(uv, d1) * 2.0 + t) * 0.5 + 0.5);
    
    vec2 d2 = normalize(vec2(-1.0, 0.8));
    h += (u_waveHeight * 0.6) * (sin(dot(uv, d2) * 3.5 - t * 1.3) * 0.5 + 0.5);
    
    vec2 d3 = normalize(vec2(0.3, -1.5));
    h += (u_waveHeight * 0.3) * (sin(dot(uv, d3) * 6.0 + t * 1.8) * 0.5 + 0.5);

    if(micro) h += noise(uv * 12.0 + t) * (u_waveHeight * 0.15);
    
    // 3D MOUSE WAKE / LIQUID RIPPLES (Strictly Mobile Touch Only)
    if(u_isMobile > 0.5 && u_touching > 0.5) {
        vec2 m_uv = u_mouse * vec2(u_res.x / u_res.y, 1.0) * 0.5;
        vec3 m_rd = normalize(vec3(m_uv.x, m_uv.y - 0.1, 1.1 + u_warp * 0.6));
        
        if(m_rd.y < -0.05) {
            vec3 ro_m = vec3(0.0, 1.5, u_time * 0.3 * (2.0 + u_warp * 35.0));
            float safeY = clamp(m_rd.y, -0.85, -0.15); 
            vec3 m_p = ro_m - m_rd * (1.5 / safeY); 
            
            float dist = length(p.xz - m_p.xz);
            float wake = smoothstep(3.5, 0.0, dist) * cos(dist * 7.0 - u_time * 12.0) * 0.06;
            h += wake * (1.0 - smoothstep(0.0, 0.5, u_warp)); 
        }
    }

    return h - (u_waveHeight * 0.5); 
}

// NORMAL CALCULATION 
vec3 GetNormal(vec3 p, bool micro) {
    vec2 e = vec2(0.04, 0.0); 
    float h = GetWaterHeight(p, micro);
    return normalize(vec3(
        h - GetWaterHeight(p - e.xyy, micro), 
        0.08, 
        h - GetWaterHeight(p - e.yxy, micro)
    ));
}

// DYNAMIC PLANAR STAR ENGINE
float GetStars(vec3 rd, float nightFactor, bool isRef) {
    vec3 starRd = isRef ? normalize(vec3(rd.x, abs(rd.y), rd.z)) : rd;
    vec2 starUV = starRd.xz / (abs(starRd.y) + 0.001);
    
    float baseHash = hash(starUV);
    float stars = pow(baseHash, isRef ? u_starDensity * 1.33 : u_starDensity);
    
    float starPhase = hash(starUV + vec2(45.2, 12.8)) * PI * 2.0; 
    float starFreq = hash(starUV + vec2(9.3, 74.1)) * 2.5 + 0.5; 
    float twinkle = 0.5 + 0.5 * sin(u_time * starFreq + starPhase);
    
    float warpFade = 1.0 - smoothstep(0.1, 0.7, u_warp);
    return stars * twinkle * nightFactor * (isRef ? 0.3 : 1.2) * warpFade;
}

// --- OPTIMIZED CLOUD ENGINE (Dynamic LOD for Reflections) ---
float getClouds(vec3 rd, float t, bool isRef) {
    if(rd.y < 0.0) return 0.0;
    vec2 uv = rd.xz / (rd.y + 0.001) * 0.4;
    uv.x -= t * 0.05; 
    
    float f = noise(uv);
    uv = mat2(1.6, 1.2, -1.2, 1.6) * uv;
    f += 0.5 * noise(uv + t * 0.03);
    
    // Performance saver: Skip 3rd octave math for water reflections
    if(!isRef) {
        uv = mat2(1.6, 1.2, -1.2, 1.6) * uv;
        f += 0.25 * noise(uv - t * 0.02);
    }
    
    f = smoothstep(0.9, 1.7, f);
    return f * smoothstep(0.0, 0.15, rd.y); 
}

vec3 getCloudColor(vec3 rd, vec3 sunDir) {
    vec3 cloudDay = vec3(0.95, 0.98, 1.0);
    vec3 cloudSunset = vec3(1.0, 0.4, 0.15);
    vec3 cloudNight = vec3(0.01, 0.015, 0.03); 
    
    float cloudDayFact = smoothstep(-0.1, 0.15, sunDir.y); 
    vec3 cColor = mix(cloudNight, mix(cloudSunset, cloudDay, smoothstep(-0.05, 0.25, sunDir.y)), cloudDayFact);
    
    float sDot = max(0.0, dot(rd, sunDir));
    cColor += vec3(1.0, 0.6, 0.2) * pow(sDot, 5.0) * smoothstep(-0.1, 0.3, sunDir.y) * 0.5; 
    return cColor;
}

void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / u_res.y;
    float t = u_time * 0.3;
    
    float shakeIntensity = pow(u_warp, 5.0) * 0.04;
    vec2 cameraShake = vec2(sin(u_time * 150.0), cos(u_time * 130.0)) * shakeIntensity;
    uv += cameraShake;

    float solarEase = u_warp * u_warp * (3.0 - 2.0 * u_warp);
    
    // SUN CENTER START FIX: Changed 0.5 to 0.25 so it centers perfectly in the sky on initial mobile load
    float currentSunY = mix(0.25 + u_mouse.y * 1.2, -1.5, solarEase);
    vec3 sunDir = normalize(vec3(u_mouse.x * 1.5, currentSunY, 1.0));
    vec3 moonDir = normalize(vec3(-u_mouse.x * 1.5, -currentSunY + 0.15, -1.0));

    vec3 ro = vec3(0, 1.5, t * (2.0 + u_warp * 35.0));
    vec3 rd = normalize(vec3(uv.x, uv.y - 0.1, 1.1 + u_warp * 0.6)); 

    float dayFactor = smoothstep(-0.02, 0.15, sunDir.y);
    float nightFactor = 1.0 - dayFactor;
    
    vec3 nightZenith = vec3(0.000, 0.001, 0.005); 
    vec3 nightHorizon = vec3(0.002, 0.008, 0.025);
    vec3 dayZenith = vec3(0.05, 0.15, 0.4);
    
    vec3 dayHorizon = vec3(0.35, 0.65, 0.85); 
    vec3 sunsetHorizon = vec3(1.0, 0.35, 0.1);
    
    vec3 zenith = mix(nightZenith, dayZenith, dayFactor);
    vec3 horizon = mix(nightHorizon, mix(sunsetHorizon, dayHorizon, smoothstep(0.0, 0.4, sunDir.y)), dayFactor);
    
    float sunsetGlow = smoothstep(-0.15, 0.1, sunDir.y) * smoothstep(0.4, -0.05, sunDir.y);
    horizon += vec3(1.0, 0.4, 0.1) * sunsetGlow * pow(max(0.0, dot(rd, sunDir)), 1.5);
    
    float skyGrad = smoothstep(-0.2, 0.6, rd.y);
    vec3 col = mix(horizon, zenith, skyGrad);
    
    float sunMask = smoothstep(-0.05, 0.02, sunDir.y);
    float moonMask = smoothstep(-0.05, 0.02, moonDir.y);

    // PERFORMANCE OPTIMIZATION: Only calculate galaxy/stars if it is actually night!
    if(nightFactor > 0.01) {
        vec2 nebUV = rd.xz / (abs(rd.y) + 0.001);
        float neb = noise(nebUV * 2.0 + u_time * 0.01) * noise(nebUV * 4.0 - u_time * 0.01);
        vec3 milkyWay = vec3(0.08, 0.03, 0.12) * neb * nightFactor * smoothstep(0.0, 0.3, rd.y) * 0.6;
        col += milkyWay * (1.0 - smoothstep(0.2, 0.8, u_warp));
        
        col += GetStars(rd, nightFactor, false) * smoothstep(-0.1, 0.2, rd.y);
    }

    float cloudAlpha = getClouds(rd, u_time, false);
    if(cloudAlpha > 0.0) {
        col = mix(col, getCloudColor(rd, sunDir), cloudAlpha * 0.65);
    }

    float sunDot = max(0.0, dot(rd, sunDir));
    float sunAlt = max(0.0, sunDir.y);
    
    vec3 coreColor = mix(vec3(1.0, 0.7, 0.4), vec3(1.0, 0.98, 0.95), smoothstep(0.0, 0.3, sunAlt));
    vec3 glowColor = mix(vec3(1.0, 0.25, 0.05), vec3(1.0, 0.8, 0.5), smoothstep(0.0, 0.4, sunAlt));
    
    float sunCore = smoothstep(0.9985, 0.9998, sunDot) * 2.5; 
    float sunInnerGlow = pow(sunDot, 180.0) * 1.5;            
    float sunOuterGlow = pow(sunDot, 50.0) * 0.8;             
    float sunAtmosphere = pow(sunDot, 12.0) * 0.4;            
    
    vec3 cinematicSun = coreColor * sunCore;
    cinematicSun += glowColor * sunInnerGlow;
    cinematicSun += glowColor * sunOuterGlow;
    cinematicSun += mix(vec3(1.0, 0.1, 0.0), glowColor, 0.5) * sunAtmosphere;
    col += cinematicSun * sunMask;
    
    float moonDot = max(0.0, dot(rd, moonDir));
    float moonCore = smoothstep(0.999, 0.9998, moonDot) * 2.5; 
    float moonGlow = pow(moonDot, 120.0) * 0.8 + pow(moonDot, 30.0) * 0.3;
    col += vec3(0.8, 0.9, 1.0) * (moonCore + moonGlow) * nightFactor * moonMask;

    if(rd.y < 0.0) {
        float d = -(ro.y) / min(rd.y, -0.002); 
        vec3 p = ro + rd * d;
        
        vec3 N_sharp = GetNormal(p, true);  
        vec3 N_smooth = GetNormal(p, false); 
        
        vec3 refR_Planar = reflect(rd, vec3(0, 1, 0)); 
        float refSkyGrad = smoothstep(-0.2, 0.6, reflect(rd, N_smooth).y);
        vec3 reflectedSky = mix(horizon, zenith, refSkyGrad);
        
        if(nightFactor > 0.01) {
            reflectedSky += vec3(0.04, 0.015, 0.06) * noise(refR_Planar.xz * 2.0) * noise(refR_Planar.xz * 4.0) * nightFactor * smoothstep(0.0, 0.3, refR_Planar.y);
            reflectedSky += GetStars(refR_Planar, nightFactor, true);
        }

        float refCloudAlpha = getClouds(refR_Planar, u_time, true);
        if(refCloudAlpha > 0.0) {
            reflectedSky = mix(reflectedSky, getCloudColor(refR_Planar, sunDir), refCloudAlpha * 0.55);
        }

        float fresnel = pow(1.0 - max(0.0, dot(-rd, N_smooth)), 5.0); 
        
        vec3 waterBase = mix(vec3(0.000, 0.001, 0.003), u_waterColor, dayFactor);
        vec3 waterCol = mix(waterBase, reflectedSky * 0.85, 0.15 + 0.85 * fresnel);

        // REALISM SSS (Sub-surface Scattering)
        float sss = pow(max(0.0, dot(sunDir, -rd)), 6.0) * max(0.0, GetWaterHeight(p, false)) * 8.0;
        waterCol += vec3(0.0, 0.6, 0.5) * sss * dayFactor * sunMask;
        
        float smoothSpecDot = max(0.0, dot(N_smooth, normalize(-rd + sunDir)));
        float sunSpecCore = pow(smoothSpecDot, 100.0) * 3.0; 
        float sunSpecGlow = pow(smoothSpecDot, 30.0) * 1.5; 
        float sunTrail = pow(max(0.0, dot(normalize(p.xz - ro.xz), sunDir.xz)), 15.0); 
        
        vec3 waterSpecColor = mix(vec3(1.0, 0.3, 0.05), vec3(1.0, 0.9, 0.7), smoothstep(0.0, 0.3, sunDir.y));
        waterCol += waterSpecColor * (sunSpecCore + sunSpecGlow) * sunTrail * sunMask; 
        
        float moonSpecDot = max(0.0, dot(N_sharp, normalize(-rd + moonDir)));
        float moonSpec = pow(moonSpecDot, 150.0) * 3.0 + pow(moonSpecDot, 30.0) * 1.0;
        float moonTrail = pow(max(0.0, dot(normalize(p.xz - ro.xz), moonDir.xz)), 30.0);
